{{ if not (.Page.Scratch.Get "vcsanim") }}
{{ with resources.Get "js/vcs-anim.js" }}
<script src="{{ (. | fingerprint).RelPermalink }}" defer></script>
{{ end }}
{{ .Page.Scratch.Set "vcsanim" true }}
{{ end }}

<figure class="vcs-anim-figure">
  <div class="vcs-anim"
       data-scene="{{ .Get "scene" }}"
       {{ with .Get "height" }}data-height="{{ . }}"{{ end }}></div>
  {{ with .Get "caption" }}<figcaption>{{ . | markdownify }}</figcaption>{{ end }}
</figure>
